[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# BecToken.sol is pragma ^0.4.16 while forge-std/Test.sol is ^0.8.x.
# Let forge pick a compatible solc per-file, and use an EVM version that
# old solc (0.4.x) can actually target.
auto_detect_solc = true
evm_version = "istanbul"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
