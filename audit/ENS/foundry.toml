# Изолированный Foundry-проект для аудита реального ENS ETHRegistrarController.
# Запуск ИЗ этой директории: `cd audit/ENS && ./vendor.sh && forge test -vv`
# Зависимости вендорятся скриптом ./vendor.sh (см. README.md) и НЕ коммитятся —
# remappings ниже указывают на ./vendor/.
[profile.default]
src = "src"
test = "test"
out = "out"
libs = []
cache_path = "cache"
solc = "0.8.17"
evm_version = "london"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=vendor/openzeppelin-4.9.3/contracts/",
    "forge-std/=vendor/forge-std/src/",
]
